<!DOCTYPE html>
<html>

<head>

<title>AI Code Visualizer</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h1 class="title">AI Code Visualizer</h1>

<div class="container">

<div class="editor">

<h2>Python Code</h2>

<textarea id="codeInput" placeholder="Paste Python code here"></textarea>

<div class="buttons">

<button onclick="visualize()">AST</button>

<button onclick="visualizeCFG()">CFG</button>

<button onclick="explainCode()">Explain</button>

</div>

</div>

<div class="visualizer">

<h2>Visualization</h2>

<div id="tree"></div>

<pre id="output"></pre>

</div>

</div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="script.js"></script>

</body>

</html>
